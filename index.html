@keyframes slowZoom{from{transform:scale(1.03)}to{transform:scale(1.10)}}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(12,14,13,1) 0%,rgba(12,14,13,0.4) 45%,transparent 72%),linear-gradient(to right,rgba(12,14,13,0.6) 0%,transparent 65%);}
.hero-content{position:relative;z-index:2;max-width:720px}
.hero-kicker{font-size:0.62rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--copper);margin-bottom:1.5rem;opacity:0;animation:fadeUp 1s ease 0.4s forwards;}
h1{font-family:'Cormorant Garamond',serif;font-size:clamp(3.8rem,11vw,9rem);font-weight:400;line-height:0.88;color:var(--paper2);letter-spacing:-0.02em;opacity:0;animation:fadeUp 1.2s ease 0.6s forwards;}
h1 em{font-style:italic;color:var(--copper2);display:block}
.hero-tagline{margin-top:2rem;font-family:'Cormorant Garamond',serif;font-size:clamp(1.1rem,3vw,1.45rem);font-style:italic;color:var(--mist);max-width:460px;line-height:1.55;opacity:0;animation:fadeUp 1s ease 1s forwards;}
.hero-discipline{margin-top:1.2rem;font-size:0.6rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--fog);opacity:0;animation:fadeUp 1s ease 1.15s forwards;}
.hero-cta{margin-top:2.5rem;display:flex;gap:1rem;flex-wrap:wrap;opacity:0;animation:fadeUp 1s ease 1.3s forwards;}
.btn{display:inline-block;padding:0.8em 2em;font-size:0.63rem;letter-spacing:0.2em;text-transform:uppercase;text-decoration:none;transition:all 0.35s;cursor:pointer;font-family:'DM Sans',sans-serif;border:none;}
.btn-primary{background:var(--copper);color:var(--night);border:1px solid var(--copper)}
.btn-primary:hover{background:var(--copper2);border-color:var(--copper2)}
.btn-ghost{background:transparent;color:var(--smoke);border:1px solid var(--moss2)}
.btn-ghost:hover{border-color:var(--copper);color:var(--copper2)}

/* SECTIONS */
section{padding:5rem 2rem;position:relative;overflow:hidden}
.section-tag{position:relative;z-index:2;font-size:0.6rem;letter-spacing:0.28em;text-transform:uppercase;color:var(--sepia);margin-bottom:2.8rem;display:flex;align-items:center;gap:1rem;}
.section-tag::before{content:'';width:22px;height:1px;background:var(--sepia)}
h2{position:relative;z-index:2;font-family:'Cormorant Garamond',serif;font-size:clamp(2.2rem,5vw,4.5rem);font-weight:400;color:var(--paper);line-height:1.0;letter-spacing:-0.015em;}
h2 em{font-style:italic;color:var(--copper2)}
h3{font-family:'Cormorant Garamond',serif;font-size:clamp(1.3rem,3vw,1.9rem);font-weight:400;color:var(--paper);line-height:1.2}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--moss2) 30%,var(--moss2) 70%,transparent)}

/* LIBRO */
.libro{background:var(--night2)}
.libro-grid{display:grid;grid-template-columns:1fr 1.15fr;gap:4rem;align-items:center;margin-top:3.5rem}
.libro-img-wrap{position:relative;aspect-ratio:3/4;overflow:hidden}
.libro-img-wrap img{width:100%;height:100%;object-fit:cover;object-position:center top;filter:saturate(0.55) brightness(0.82);transition:filter 0.6s,transform 0.8s}
.libro-img-wrap:hover img{filter:saturate(0.75) brightness(0.92);transform:scale(1.03)}
.libro-img-wrap::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 55%,rgba(12,14,13,0.65))}
.libro-subtitle{font-family:'Cormorant Garamond',serif;font-size:1rem;font-style:italic;color:var(--mist);line-height:1.7;margin:1.2rem 0 1.8rem;border-left:1px solid var(--moss2);padding-left:1.4rem;}
.libro-desc{color:var(--silver);font-size:0.97rem;line-height:1.95;margin-bottom:1.5rem}
.libro-desc p+p{margin-top:1rem}
.libro-hipotesis{margin:1.8rem 0;padding:1.5rem 1.8rem;border:1px solid var(--moss2);background:rgba(42,56,48,0.12);}
.libro-hipotesis p{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.02rem;color:var(--smoke);line-height:1.85;}
.libro-hipotesis p+p{margin-top:0.8rem}
.libro-tags{display:flex;flex-wrap:wrap;gap:0.5rem;margin:1.5rem 0 2rem}
.tag{font-size:0.57rem;letter-spacing:0.14em;text-transform:uppercase;border:1px solid var(--moss2);color:var(--fog);padding:0.3em 0.8em}

/* MANIFIESTO */
.manifiesto{background:var(--night3)}
.manifiesto-inner{max-width:660px;margin:0 auto;text-align:center}
.manifiesto-inner h2{margin-bottom:2rem}
.manifiesto-text{font-family:'Cormorant Garamond',serif;font-size:clamp(1.05rem,2.5vw,1.35rem);font-style:italic;color:var(--silver);line-height:1.95}
.manifiesto-text p+p{margin-top:1.4rem}
.manifiesto-firma{margin-top:2rem;font-size:0.6rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--sepia)}

/* PODCAST */
.podcast{background:var(--night)}
.podcast-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:4rem;align-items:start;margin-top:3.5rem}
.podcast-cover{position:relative;overflow:hidden;margin-bottom:1rem}
.podcast-cover img{width:100%;display:block;filter:brightness(0.88);transition:filter 0.5s}
.podcast-cover:hover img{filter:brightness(1)}
.podcast-desc{color:var(--silver);font-size:0.97rem;line-height:1.9;margin:1.2rem 0 1.5rem}
.podcast-harta{margin:1.5rem 0;padding:1.2rem 1.5rem;border-left:2px solid var(--copper);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.05rem;color:var(--smoke);line-height:1.7;}
.spotify-embed{margin-top:1.5rem;overflow:hidden}
.hashtag-pill{display:inline-block;margin:0.5rem 0;font-size:0.63rem;letter-spacing:0.18em;color:var(--copper);text-transform:uppercase;border:1px solid var(--moss2);padding:0.25em 0.75em}

/* CARRUSEL */
.carrusel{background:var(--night2)}
.carousel-wrap{position:relative;overflow:hidden;margin-top:3rem}
.carousel-track{display:flex;transition:transform 0.6s cubic-bezier(0.4,0,0.2,1)}
.carousel-slide{min-width:100%;position:relative}
.carousel-slide img{width:100%;max-height:520px;object-fit:contain;display:block;background:var(--night3)}
.carousel-nav{display:flex;justify-content:center;gap:0.6rem;margin-top:1.5rem}
.carousel-dot{width:6px;height:6px;border-radius:50%;background:var(--moss2);border:none;cursor:pointer;transition:background 0.3s;padding:0}
.carousel-dot.active{background:var(--copper)}
.carousel-arrows{display:flex;gap:1rem;justify-content:center;margin-top:1rem}
.carousel-btn{background:transparent;border:1px solid var(--moss2);color:var(--smoke);padding:0.5em 1.2em;cursor:pointer;font-size:1rem;transition:all 0.3s;}
.carousel-btn:hover{border-color:var(--copper);color:var(--copper2)}

/* BONUS TRACKS */
.bonus{background:var(--night3)}
.bonus-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;margin-top:3rem;background:var(--moss)}
.bonus-item{background:var(--night3);padding:2.8rem 2.2rem;transition:background 0.4s}
.bonus-item:hover{background:var(--night4)}
.bonus-label{font-size:0.57rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--sepia);margin-bottom:1.2rem}
.bonus-text{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-style:italic;color:var(--silver);line-height:1.85}
.bonus-item:first-child .bonus-text{color:var(--smoke);font-size:1.1rem}
.bonus-more{margin-top:2.5rem;text-align:center}

/* MÚSICA */
.musica{background:var(--night)}
.musica-grid{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:start;margin-top:3rem}
.musica-desc{color:var(--silver);font-size:0.97rem;line-height:1.9;margin:1rem 0 2rem}
.platform-links{display:flex;flex-direction:column;gap:0.6rem}
.platform-link{display:flex;align-items:center;gap:1rem;padding:0.85rem 1.2rem;border:1px solid var(--moss2);color:var(--smoke);text-decoration:none;font-size:0.68rem;letter-spacing:0.14em;text-transform:uppercase;transition:all 0.3s;}
.platform-link:hover{border-color:var(--copper);color:var(--copper2);background:rgba(184,120,74,0.05)}
.platform-link span{flex:1}
.musica-img{overflow:hidden}
.musica-img img{width:100%;display:block;filter:saturate(0.6) brightness(0.72)}

/* CEREMONIA */
.ceremonia{background:var(--night2)}
.ceremonia-inner{display:grid;grid-template-columns:1fr 1fr;gap:0;align-items:stretch;margin-top:3rem}
.ceremonia-img{min-height:300px;overflow:hidden}
.ceremonia-img img{width:100%;height:100%;object-fit:cover;object-position:center 30%;filter:saturate(0.45) brightness(0.6) sepia(0.15);transition:filter 0.5s}
.ceremonia-img:hover img{filter:saturate(0.6) brightness(0.72) sepia(0.1)}
.ceremonia-content{background:var(--moss);padding:3rem 2.5rem;display:flex;flex-direction:column;justify-content:center;}
.ceremonia-content h2{margin-bottom:1rem;font-size:clamp(1.8rem,3.5vw,3rem)}
.ceremonia-desc{color:var(--silver);font-size:0.97rem;line-height:1.85;margin-bottom:1.8rem}
.email-form{display:flex;flex-direction:column;gap:0.7rem}
.email-input{background:rgba(12,14,13,0.55);border:1px solid var(--moss2);color:var(--smoke);padding:0.85em 1.2em;font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.3s;-webkit-appearance:none;}
.email-input::placeholder{color:var(--fog)}
.email-input:focus{border-color:var(--copper)}

/* BIO */
.bio{background:var(--night3)}
.bio-grid{display:grid;grid-template-columns:1fr 1.3fr;gap:4rem;align-items:start;margin-top:3rem}
.bio-img{overflow:hidden}
.bio-img img{width:100%;display:block;filter:saturate(0.5) brightness(0.75)}
.bio-text h2{margin-bottom:1.5rem}
.bio-text p{color:var(--silver);font-size:0.97rem;line-height:1.9;margin-bottom:1rem}
.bio-roles{display:flex;flex-wrap:wrap;gap:0.5rem;margin:1.5rem 0}
.bio-role{font-size:0.58rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--mist);border:1px solid var(--moss2);padding:0.3em 0.85em}
.bio-links{display:flex;flex-wrap:wrap;gap:0.7rem;margin-top:1rem}
.bio-link{font-size:0.6rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--fog);text-decoration:none;transition:color 0.3s;border:1px solid var(--moss);padding:0.3em 0.85em}
.bio-link:hover{color:var(--copper2);border-color:var(--copper)}

/* EVENTOS */
.eventos{background:var(--night)}
.eventos-empty{margin-top:3rem;padding:3rem 2rem;border:1px solid var(--moss);text-align:center}
.eventos-empty p{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-style:italic;color:var(--fog)}

/* CONTACTO */
.contacto{background:var(--night2);text-align:center}
.contacto h2{margin-bottom:0.8rem}
.contacto-sub{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-style:italic;color:var(--fog);margin-bottom:2.5rem}
.contact-links{display:flex;justify-content:center;gap:1.8rem;flex-wrap:wrap;margin-top:2.5rem}
.contact-link{font-size:0.63rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--fog);text-decoration:none;transition:color 0.3s;display:flex;align-items:center;gap:0.5rem}
.contact-link::before{content:'·';color:var(--sepia)}
.contact-link:hover{color:var(--copper2)}

/* FOOTER */
footer{padding:2rem;border-top:1px solid var(--moss);display:flex;flex-direction:column;gap:0.4rem;align-items:center;text-align:center}
footer p{font-size:0.58rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--fog)}


/* HIPÓTESIS */
.hipotesis{background:var(--night3)}
.hipotesis-inner{display:flex;flex-direction:column;align-items:center;gap:4rem;margin-top:3rem}
.hipotesis-pregunta{max-width:700px;width:100%;text-align:center}
.hipotesis-cita{
  margin:2.5rem auto;padding:2rem 2.5rem;
  border:1px solid var(--moss2);background:rgba(42,56,48,0.1);
  max-width:600px;
}
.hipotesis-cita p{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(1.2rem,2.8vw,1.6rem);font-style:italic;
  color:var(--paper);line-height:1.75;text-align:center;
}
.hipotesis-sub{max-width:560px;margin:0 auto;text-align:center}
.hipotesis-sub p{
  font-family:'Cormorant Garamond',serif;
  font-size:1.05rem;font-style:italic;color:var(--silver);
  line-height:1.85;
}
.hipotesis-sub p+p{margin-top:1rem}
.hipotesis-img-wrap{
  width:100%;max-width:900px;
  position:relative;overflow:hidden;
}
.hipotesis-img-wrap img{
  width:100%;display:block;
  filter:sepia(0.15) brightness(0.88) contrast(1.05);
  transition:filter 0.6s;
}
.hipotesis-img-wrap:hover img{filter:sepia(0.05) brightness(0.96) contrast(1.02)}
.hipotesis-img-overlay{
  position:absolute;bottom:1.2rem;right:1.5rem;
}
.hipotesis-tag{
  font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--copper);border:1px solid var(--moss2);
  padding:0.3em 0.8em;background:rgba(12,14,13,0.7);
}
.hipotesis-join{
  max-width:560px;width:100%;text-align:center;
  padding:3rem 2rem;border-top:1px solid var(--moss2);
}
.hipotesis-join-text{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:1.1rem;color:var(--silver);line-height:1.8;
  margin-bottom:2rem;
}
.hipotesis-join-note{
  margin-top:1.2rem;font-size:0.62rem;letter-spacing:0.15em;
  text-transform:uppercase;color:var(--fog);
}
@media(max-width:768px){
  .hipotesis-cita{padding:1.5rem}
  .hipotesis-cita p{font-size:1.1rem}
  .hipotesis-join{padding:2rem 0}
}


/* DEBATES */
.debates{background:var(--night2)}
.debates-intro{max-width:700px;margin:0 auto 3.5rem;text-align:center}
.debates-intro p{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.1rem;color:var(--silver);line-height:1.85}
.debates-pregunta{
  max-width:700px;margin:0 auto 3rem;text-align:center;
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:clamp(1.1rem,2.5vw,1.4rem);color:var(--mist);line-height:1.8;
  border-left:1px solid var(--moss2);border-right:1px solid var(--moss2);
  padding:1.5rem 2rem;
}
.debates-fragmento{
  max-width:780px;margin:0 auto;
  border:1px solid var(--moss2);padding:3rem;
  background:rgba(42,56,48,0.07);
  position:relative;
}
.debates-fragmento::before{
  content:'"';
  font-family:'Cormorant Garamond',serif;
  font-size:6rem;color:var(--moss2);
  position:absolute;top:-1rem;left:1.5rem;
  line-height:1;
}
.debates-fragmento p{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:1.05rem;color:var(--silver);line-height:1.9;
}
.debates-fragmento p+p{margin-top:1.2rem}
.debates-label{font-size:0.58rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--sepia);margin-bottom:1.5rem}
.debates-cta{margin-top:2.5rem;text-align:center}
.debates-note{margin-top:1rem;font-size:0.62rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--fog)}
@media(max-width:768px){
  .debates-fragmento{padding:2rem 1.5rem}
  .debates-pregunta{padding:1.2rem 1.5rem}
}


/* SUBLIMINAL WORDS */
.sub-word {
  position:absolute;
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  color:var(--smoke);
  font-size:clamp(0.6rem,1vw,0.85rem);
  letter-spacing:0.1em;
  white-space:nowrap;
  pointer-events:none;
  user-select:none;
  z-index:1;
  opacity:0.11;
  will-change:transform,opacity;
  transition: none;
}

/* REVEAL */
.reveal{opacity:0;transform:translateY(24px);transition:opacity 0.85s ease,transform 0.85s ease}
.reveal.visible{opacity:1;transform:translateY(0)}
.reveal-slow{opacity:0;transform:translateY(16px);transition:opacity 1.1s ease 0.15s,transform 1.1s ease 0.15s}
.reveal-slow.visible{opacity:1;transform:translateY(0)}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* MOBILE */
@media(max-width:768px){
  nav{padding:1.1rem 1.2rem}
  .nav-links{display:none;flex-direction:column;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(12,14,13,0.98);justify-content:center;align-items:center;gap:2rem;z-index:300;}
  .nav-links.open{display:flex}
  .nav-links a{font-size:1rem;letter-spacing:0.15em}
  .nav-toggle{display:block}
  .hero{padding:0 1.2rem 5rem}
  section{padding:3.5rem 1.2rem}
  .libro-grid,.podcast-grid,.musica-grid,.bio-grid{grid-template-columns:1fr;gap:2rem}
  .libro-img-wrap{aspect-ratio:4/3}
  .bonus-grid{grid-template-columns:1fr}
  .ceremonia-inner{grid-template-columns:1fr}
  .ceremonia-img{min-height:220px}
  .ceremonia-content{padding:2.2rem 1.4rem}
  .hero-cta{flex-direction:column;align-items:flex-start}
  .btn{width:100%;text-align:center;display:block}
  .contact-links{gap:1rem}
  footer{padding:1.5rem 1.2rem}
  .carousel-slide img{max-height:360px}
}
/* ═══════════════════════════════════════════════
   ORÁCULO CIENTÍFICO — CSS
 ═══════════════════════════════════════════════ */

/* --- SECCIÓN BASE --- */
.juegos {
  background: var(--night2);
  padding: 6rem 2rem 5rem;
  position: relative;
  overflow: hidden;
}
.juegos::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(184,120,74,0.07) 0%, transparent 70%);
  pointer-events: none;
}

/* --- HEADER --- */
.juegos-header {
  text-align: center;
  margin-bottom: 3.5rem;
}
.juegos-supratitulo {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem;
  letter-spacing: 0.18em;
  color: var(--sepia);
  text-transform: uppercase;
  margin-bottom: 1.2rem;
}
.juegos-titulo {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(3rem, 7vw, 5.5rem);
  font-weight: 300;
  color: var(--smoke);
  line-height: 1;
  letter-spacing: -0.02em;
}
.juegos-titulo em {
  font-style: italic;
  color: var(--copper);
  display: block;
}
.juegos-bajada {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem;
  color: var(--mist);
  margin-top: 1rem;
  font-weight: 300;
}

/* --- IMAGEN --- */
.juegos-imagen-wrap {
  max-width: 860px;
  margin: 0 auto 4rem;
  position: relative;
  overflow: hidden;
}
.juegos-imagen {
  width: 100%;
  display: block;
  filter: sepia(0.2) brightness(0.82) contrast(1.08);
  transition: filter 0.8s ease;
}
.juegos-imagen-wrap:hover .juegos-imagen {
  filter: sepia(0.05) brightness(0.92) contrast(1.04);
}
.juegos-imagen-overlay {
  position: absolute;
  bottom: 1rem;
  right: 1.2rem;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  color: var(--silver);
  text-transform: uppercase;
  opacity: 0.6;
}

/* --- GRILLA --- */
.juegos-grilla {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 1.5rem;
  max-width: 1100px;
  margin: 0 auto 4rem;
}

/* --- CARDS --- */
.juego-card {
  background: var(--night3);
  border: 1px solid rgba(174,197,184,0.08);
  cursor: pointer;
  transition: border-color 0.3s, transform 0.3s, background 0.3s;
  position: relative;
  overflow: hidden;
}
.juego-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(184,120,74,0.04) 0%, transparent 60%);
  opacity: 0;
  transition: opacity 0.4s;
}
.juego-card:hover {
  border-color: rgba(184,120,74,0.35);
  transform: translateY(-3px);
  background: var(--night4);
}
.juego-card:hover::before { opacity: 1; }

.juego-card-inner {
  padding: 2rem 1.8rem;
  display: flex;
  flex-direction: column;
  gap: 0.7rem;
  height: 100%;
}
.juego-numero {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.8rem;
  color: var(--sepia);
  letter-spacing: 0.2em;
}
.juego-nombre {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.45rem;
  font-weight: 400;
  color: var(--smoke);
  line-height: 1.2;
}
.juego-desc {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  color: var(--fog);
  font-weight: 300;
  line-height: 1.5;
  flex: 1;
}
.juego-btn {
  align-self: flex-start;
  margin-top: 0.8rem;
  background: none;
  border: 1px solid rgba(184,120,74,0.4);
  color: var(--copper);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 0.5rem 1.2rem;
  cursor: pointer;
  transition: background 0.3s, color 0.3s;
}
.juego-btn:hover {
  background: var(--copper);
  color: var(--night);
}

/* --- PANEL DE JUEGO --- */
.juego-panel {
  max-width: 720px;
  margin: 0 auto 3rem;
  background: var(--night4);
  border: 1px solid rgba(174,197,184,0.1);
  padding: 3rem 2.5rem;
  position: relative;
  animation: panelEntra 0.4s ease;
}
.juego-panel[hidden] { display: none; }
@keyframes panelEntra {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
.juego-panel-cerrar {
  position: absolute;
  top: 1.2rem;
  right: 1.5rem;
  background: none;
  border: none;
  color: var(--fog);
  font-size: 1.1rem;
  cursor: pointer;
  transition: color 0.2s;
}
.juego-panel-cerrar:hover { color: var(--copper); }

/* --- CONTENIDO DINÁMICO DEL PANEL --- */
.panel-titulo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.6rem;
  font-weight: 300;
  color: var(--smoke);
  margin-bottom: 2rem;
  font-style: italic;
}
.panel-pista {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  color: var(--silver);
  padding: 0.9rem 1.2rem;
  border-left: 2px solid rgba(184,120,74,0.3);
  margin-bottom: 0.8rem;
  opacity: 0;
  transition: opacity 0.5s ease;
}
.panel-pista.visible { opacity: 1; }
.panel-pista-btn {
  background: none;
  border: 1px solid rgba(174,197,184,0.2);
  color: var(--mist);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem;
  letter-spacing: 0.1em;
  padding: 0.5rem 1rem;
  cursor: pointer;
  margin-top: 1rem;
  transition: border-color 0.3s, color 0.3s;
}
.panel-pista-btn:hover { border-color: var(--copper); color: var(--copper); }
.panel-input {
  width: 100%;
  background: var(--night);
  border: 1px solid rgba(174,197,184,0.15);
  border-radius: 0;
  color: var(--smoke);
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.3rem;
  padding: 0.8rem 1rem;
  margin-top: 1.5rem;
  outline: none;
  transition: border-color 0.3s;
}
.panel-input:focus { border-color: var(--copper); }
